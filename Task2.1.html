<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Task 2</title>
  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <link rel="stylesheet" href="Task2.1.css">
</head>

<body>


  <header class="top">
    <div class="logo">
      Linked<span>in</span>
    </div>
  </header>

 
  <main class="main">

    <section class="card">
      <h2>Sign in</h2>
      <p class="subtitle">Stay updated on your professional world</p>

      <form>

        <input type="text" placeholder="Email or Phone">

        <div class="pass-row">
          <input type="password" placeholder="Password">
          <button type="button" class="show-btn">show</button>
        </div>

        <a href="#" class="forgot">Forgot password?</a>

        <button type="button" class="primary">Sign in</button>

        <div class="divider">
          <span></span>
          <p>or</p>
          <span></span>
        </div>

        <button type="button" class="apple">
          <i class="fa-brands fa-apple"></i>
          Sign in with Apple
        </button>

      </form>
    </section>

    <p class="join">
      New to LinkedIn? <a href="#">Join now</a>
    </p>

  </main>

  
  <footer class="footer">
    <div class="footer-inner">
      <span class="foot-brand">
        Linked<span>in</span> © 2021
      </span>
      <a href="#">User Agreement</a>
      <a href="#">Privacy Policy</a>
      <a href="#">Community Guidelines</a>
      <a href="#">Cookie Policy</a>
      <a href="#">Copyright Policy</a>
      <a href="#">Send Feedback</a>
      <a href="#">Language</a>
    </div>
  </footer>

</body>
</html>
