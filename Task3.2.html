<body>

  <div class="bg">

        </div>
      </div>

      <div class="right">

        <div class="input">
          <i class="fa-regular fa-envelope"></i>

        <div class="input">
          <i class="fa-solid fa-lock"></i>
          <input type="password" placeholder=".....">

        <button class="btn">LOGIN</button>

        <p class="small">
          Forgot <span>Username</span> / <span>Password</span> ?
        </p>

        <p class="create">Create your account  </p>
      </div>

    </div>
  </div>
