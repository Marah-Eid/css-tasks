<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Task 2.3</title>
  <link rel="stylesheet" href="Task2.3.css">
</head>
<body>

  <div class="frame">
    <div class="card">

      <h2>Login</h2>

      <form class="form">
        <input type="email" placeholder="Email">
        <input type="password" placeholder="Password">

        <label class="show">
          <input type="checkbox">
          Show Password
        </label>

        <button type="button" class="btn">SIGN IN</button>
      </form>

      <p class="text">
        Forgot <a href="#">Username</a> / <a href="#">Password?</a>
      </p>

      <p class="text">
        Don't have an account? <a href="#">Sign up</a>
      </p>

    </div>
  </div>

</body>
</html>
